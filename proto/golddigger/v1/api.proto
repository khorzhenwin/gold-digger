syntax = "proto3";

package golddigger.v1;

option go_package = "github.com/khorzhenwin/gold-digger/gen/golddigger/v1;golddiggerv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message HealthResponse {
  string status = 1;
  string message = 2;
}

message GetHealthRequest {}

message GetHealthResponse {
  HealthResponse health = 1;
}

message TickerPrice {
  string symbol = 1;
  double price = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message GetTickerPriceRequest {
  string ticker = 1;
}

message WatchlistItem {
  uint64 id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string symbol = 4;
  string notes = 5;
}

message ListWatchlistRequest {}

message ListWatchlistResponse {
  repeated WatchlistItem items = 1;
}

message CreateWatchlistItemRequest {
  WatchlistItem ticker = 1;
}

message UpdateWatchlistItemRequest {
  uint64 id = 1;
  WatchlistItem ticker = 2;
}

message DeleteWatchlistItemRequest {
  uint64 id = 1;
}

message OperationStatus {
  string message = 1;
}

service HealthService {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse) {
    option (google.api.http) = {get: "/api/v1/health"};
  }
}

service TickerPriceService {
  rpc GetTickerPrice(GetTickerPriceRequest) returns (TickerPrice) {
    option (google.api.http) = {get: "/api/v1/ticker-price/{ticker}"};
  }
}

service WatchlistService {
  rpc ListWatchlist(ListWatchlistRequest) returns (ListWatchlistResponse) {
    option (google.api.http) = {get: "/api/v1/watchlist"};
  }

  rpc CreateWatchlistItem(CreateWatchlistItemRequest) returns (OperationStatus) {
    option (google.api.http) = {
      post: "/api/v1/watchlist"
      body: "ticker"
    };
  }

  rpc UpdateWatchlistItem(UpdateWatchlistItemRequest) returns (OperationStatus) {
    option (google.api.http) = {
      put: "/api/v1/watchlist/{id}"
      body: "ticker"
    };
  }

  rpc DeleteWatchlistItem(DeleteWatchlistItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/watchlist/{id}"};
  }
}
